<!DOCTYPE html>
<html lang="en">
<!-- this is about our page -->
<!-- tags are types of elements -->
<!-- elements can have nesteed elements within them, no content, or just text -->
<!-- <opentag> content or other element </closetag> -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<!-- content that displays on our page -->

<body>
    this is some text

     <!-- type in the tag name and hit tab - skeleton/templated version of the tag -->

    <p>this is a paragraph of text</p>

    <!-- h1, h2, h3, h4, h5, h6 -->

    <h1>Largest</h1>
    <h2>Smaller than Largest</h2>
    <h6>Smallest</h6>

     <div>This is some text</div>
