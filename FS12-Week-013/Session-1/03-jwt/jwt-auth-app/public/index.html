<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JWT Authentication Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>JWT Authentication Demo</h1>
      <p class="subtitle">In-Memory Storage Example</p>
    </header>

    <main>
      <!-- Authentication Section -->
      <section id="auth-section" class="card">
        <h2>Login or Signup</h2>

        <div class="form-container">
          <!-- Signup Form -->
          <div class="form-group">
            <h3>Create Account</h3>
            <form id="signup-form">
              <input
                type="text"
                id="signup-username"
                placeholder="Username"
                required
              >
              <input
                type="password"
                id="signup-password"
                placeholder="Password"
                required
              >
              <button type="submit">Sign Up</button>
            </form>
          </div>

          <!-- Login Form -->
          <div class="form-group">
            <h3>Login</h3>
            <form id="login-form">
              <input
                type="text"
                id="login-username"
                placeholder="Username"
                required
              >
              <input
                type="password"
                id="login-password"
                placeholder="Password"
                required
              >
              <button type="submit">Login</button>
            </form>
          </div>
        </div>

        <div id="auth-message" class="message"></div>
      </section>

      <!-- Protected Content Section -->
      <section id="protected-section" class="card hidden">
        <h2>Welcome, <span id="username-display"></span></h2>

        <div class="button-group">
          <button id="get-profile-btn" class="secondary-btn">Get Profile</button>
          <button id="get-dashboard-btn" class="secondary-btn">Get Dashboard</button>
          <button id="logout-btn" class="logout-btn">Logout</button>
        </div>

        <div id="protected-content" class="content-box"></div>
        <div id="token-display" class="token-box"></div>
      </section>

      <!-- Message Section -->
      <section id="message-section" class="card">
        <h3>Response Messages</h3>
        <div id="response-message" class="message-box"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
