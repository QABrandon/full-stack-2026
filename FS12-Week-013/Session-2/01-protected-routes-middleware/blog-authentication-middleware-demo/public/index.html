<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protected Routes Blog Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="main-header">
      <h1>Protected Routes Blog</h1>
      <p class="subtitle">Demonstrating Authentication Middleware and Resource Ownership</p>
      <nav id="nav-bar"></nav>
    </header>

    <main>
      <!-- Auth Section -->
      <section id="auth-section" class="card">
        <div class="tabs">
          <button id="register-tab" class="tab-button active">Register</button>
          <button id="login-tab" class="tab-button">Login</button>
        </div>

        <div id="register-panel" class="tab-panel active">
          <h2>Create Account</h2>
          <form id="register-form">
            <input type="text" id="reg-username" placeholder="Username" required>
            <input type="email" id="reg-email" placeholder="Email" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <button type="submit">Register</button>
          </form>
        </div>

        <div id="login-panel" class="tab-panel">
          <h2>Login</h2>
          <form id="login-form">
            <input type="text" id="login-username" placeholder="Username" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Login</button>
          </form>
        </div>

        <div id="auth-message" class="message"></div>
      </section>

      <!-- All Posts Section (Public) -->
      <section id="all-posts-section" class="card">
        <h2>All Blog Posts (Public)</h2>
        <p class="section-note">Anyone can view these posts without authentication</p>
        <div id="all-posts-container"></div>
      </section>

      <!-- User Dashboard (Protected) -->
      <section id="dashboard-section" class="card hidden">
        <div class="dashboard-header">
          <div>
            <h2>My Dashboard</h2>
            <p id="user-info"></p>
          </div>
          <button id="logout-btn" class="logout-btn">Logout</button>
        </div>

        <div class="dashboard-actions">
          <button id="view-profile-btn" class="action-btn">View Profile</button>
          <button id="view-my-posts-btn" class="action-btn">My Posts</button>
          <button id="create-post-btn" class="action-btn primary">Create New Post</button>
        </div>

        <div id="dashboard-content"></div>
      </section>

      <!-- Create/Edit Post Modal -->
      <div id="post-modal" class="modal hidden">
        <div class="modal-content">
          <h3 id="modal-title">Create New Post</h3>
          <form id="post-form">
            <input type="hidden" id="edit-post-id">
            <input type="text" id="post-title" placeholder="Post Title" required>
            <textarea id="post-content" placeholder="Post Content" rows="8" required></textarea>
            <div class="modal-buttons">
              <button type="submit">Save Post</button>
              <button type="button" id="cancel-post-btn" class="secondary-btn">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
