<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1259.4445591801905 617.3748929281282" width="1259.4445591801905" height="617.3748929281282"><!-- svg-source:excalidraw --><metadata></metadata><defs><style class="style-fonts">
      @font-face { font-family: Excalifont; src: url(data:font/woff2;base64,); }</style></defs><rect x="0" y="0" width="1259.4445591801905" height="617.3748929281282" fill="#ffffff"></rect><g transform="translate(10 10) rotate(0 94.10795593261719 17.5)"><text x="0" y="24.668" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="28px" fill="#2f9e44" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Daily Standup</text></g><g stroke-linecap="round"><g transform="translate(138.59039293535898 51) rotate(0 4.489448321990039 46.00199920599334)"><path d="M-0.89 -0.26 C0.38 15.16, 6.1 76.57, 7.75 92.05 M0.84 -1.44 C2.46 14.19, 8.62 77.53, 9.87 93.44" stroke="#2f9e44" stroke-width="2" fill="none"></path></g><g transform="translate(138.59039293535898 51) rotate(0 4.489448321990039 46.00199920599334)"><path d="M-0.74 70.81 C2.01 75.96, 5.24 85.02, 9.87 93.44 M-0.74 70.81 C2.16 78.19, 6.33 84.83, 9.87 93.44" stroke="#2f9e44" stroke-width="2" fill="none"></path></g><g transform="translate(138.59039293535898 51) rotate(0 4.489448321990039 46.00199920599334)"><path d="M16.3 69.28 C13.81 74.78, 11.8 84.31, 9.87 93.44 M16.3 69.28 C13.68 77.22, 12.35 84.36, 9.87 93.44" stroke="#2f9e44" stroke-width="2" fill="none"></path></g></g><mask></mask><g transform="translate(87.68213093478516 167.01500715193106) rotate(0 205.91192626953125 17.5)"><text x="0" y="24.668" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="28px" fill="#2f9e44" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Transparency / Trust Meeting</text></g><g transform="translate(90.36459201862681 211.97354043043742) rotate(0 378.5879211425781 70)"><text x="0" y="24.668" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="28px" fill="#2f9e44" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Coordination Meeting</text><text x="0" y="59.668" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="28px" fill="#2f9e44" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Usually done within the first 1hr or so of the work day</text><text x="0" y="94.668" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="28px" fill="#2f9e44" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Takes around 15 min to do</text><text x="0" y="129.668" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="28px" fill="#2f9e44" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">And usually 4-9 people are in the meeting</text></g><g transform="translate(144.64902695362798 397.37489292812825) rotate(0 552.3977661132812 105)"><text x="0" y="24.668" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="28px" fill="#2f9e44" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">- You are suppose to stand up during the meeting (most remote people sit down)</text><text x="0" y="59.668" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="28px" fill="#2f9e44" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">- Usually 15 min or less (hence why we are suppose to stand)</text><text x="0" y="94.668" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="28px" fill="#2f9e44" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">- 3 main questions we are to answer one at a time:</text><text x="0" y="129.668" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="28px" fill="#2f9e44" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">     - What did I do yesterday?</text><text x="0" y="164.668" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="28px" fill="#2f9e44" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">     - What will I work on today?</text><text x="0" y="199.668" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="28px" fill="#2f9e44" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">     Any blockers? (what help or support do you need)</text></g></svg>