<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations Practice</title>
    <link rel="stylesheet" href="demo.css">
</head>
<body>
    <div class="container">
        <h1>CSS Animation Practice</h1>
        
        <!-- Part 1: Fade In Animation -->
        <section class="section">
            <h2>Part 1: Fade In</h2>
            <div class="box fade-box">Fade In</div>
        </section>

        <!-- Part 2: Duration Examples -->
        <section class="section">
            <h2>Part 2: Duration</h2>
            <div class="box slow-fade">Slow (5s)</div>
            <div class="box medium-fade">Medium (2s)</div>
            <div class="box fast-fade">Fast (0.5s)</div>
        </section>

        <!-- Part 3: Delay Examples -->
        <section class="section">
            <h2>Part 3: Delay</h2>
            <div class="box item-1">No Delay</div>
            <div class="box item-2">0.2s Delay</div>
            <div class="box item-3">0.4s Delay</div>
        </section>

        <!-- Part 4: Iteration Count -->
        <section class="section">
            <h2>Part 4: Iterations</h2>
            <div class="box glow-once">Once</div>
            <div class="box glow-three">3 Times</div>
            <div class="box glow-infinite">Infinite</div>
        </section>

        <!-- Part 5: Timing Functions -->
        <section class="section">
            <h2>Part 5: Timing Functions</h2>
            <div class="box linear-box">Linear</div>
            <div class="box ease-box">Ease</div>
            <div class="box ease-in-box">Ease-in</div>
            <div class="box ease-out-box">Ease-out</div>
        </section>

        <!-- Part 6: Complex Animation -->
        <section class="section">
            <h2>Part 6: Complex Animation</h2>
            <div class="box complex-box">Complex</div>
        </section>
    </div>
</body>
</html>
