<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1194.2416905395328 839.7035160652704" width="1194.2416905395328" height="839.7035160652704"><!-- svg-source:excalidraw --><metadata></metadata><defs><style class="style-fonts">
      @font-face { font-family: Excalifont; src: url(data:font/woff2;base64,); }</style></defs><rect x="0" y="0" width="1194.2416905395328" height="839.7035160652704" fill="#ffffff"></rect><g transform="translate(10 10) rotate(0 521.6578369140625 337.5)"><text x="0" y="31.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Event handling in React</text><text x="0" y="76.71600000000001" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="121.71600000000001" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">user - Clicks on an element</text><text x="0" y="166.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">      - Changes an input</text><text x="0" y="211.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">      - Submits a form</text><text x="0" y="256.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="301.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">function Button(){</text><text x="0" y="346.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">  const handleClick = () =&gt; {</text><text x="0" y="391.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">    alert("Hello! You clicked the button!");</text><text x="0" y="436.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"> }</text><text x="0" y="481.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="526.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">  return &lt;button onClick={handleClick}&gt; Click Me! &lt;/button&gt;</text><text x="0" y="571.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">         </text><text x="0" y="616.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">}</text><text x="0" y="661.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text></g><g stroke-linecap="round"><g transform="translate(369.2333330381938 738.8735419240475) rotate(0 -2.5477755937388906 -91.90505893217141)"><path d="M-0.3 -0.47 C-1.19 -30.87, -4.78 -151.35, -5.92 -181.35 M1.74 -1.76 C0.75 -32.03, -5.75 -153.25, -6.84 -183.34" stroke="#9c36b5" stroke-width="2" fill="none"></path></g><g transform="translate(369.2333330381938 738.8735419240475) rotate(0 -2.5477755937388906 -91.90505893217141)"><path d="M2.78 -160.26 C-0.63 -166.03, -1.85 -173.84, -6.84 -183.34 M2.78 -160.26 C-1.73 -170.12, -4.38 -178.17, -6.84 -183.34" stroke="#9c36b5" stroke-width="2" fill="none"></path></g><g transform="translate(369.2333330381938 738.8735419240475) rotate(0 -2.5477755937388906 -91.90505893217141)"><path d="M-14.3 -159.48 C-13.41 -165.4, -10.31 -173.41, -6.84 -183.34 M-14.3 -159.48 C-12.14 -169.54, -8.11 -177.89, -6.84 -183.34" stroke="#9c36b5" stroke-width="2" fill="none"></path></g></g><mask></mask><g transform="translate(318.33397569578267 739.7035160652704) rotate(0 432.95385742187506 45)"><text x="0" y="31.716" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">This looks like onClick from standard HTML/DOM</text><text x="0" y="76.71600000000001" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="36px" fill="#9c36b5" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">it secretly uses addEventListener</text></g></svg>