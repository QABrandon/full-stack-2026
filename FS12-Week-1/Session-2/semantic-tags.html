<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- meaningless tags -->
    <div>This tag just provides a block as an element</div>
    <span>This is a inline element</span>

    <!-- before semantic tags -->
     <div id="header">
        <div id="nav"></div>
     </div>

     <div id="main"> this is the main section</div>
     <div id="footer">this is the footer</div>
     <!-- the approach above is not readable by devs -->
      <!-- not readable by screen readers -->

      <!-- the semantic way -->

      <header>
        <nav></nav>
      </header>

      <main>
        <section></section>
      </main>

      <footer></footer>

    <!-- a bunch more like aside ,article, etc could be used -->
</body>
</html>
