<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- our stylesheet -->
    <link rel="stylesheet" href="font-awesome.css" />

    <!-- cdn link - no instructions show this  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- you can use a kit off of the site to install font-awesome -->
    <!-- this is more efficient and has the option to only download the fonts you use -->
    <!-- <script defer
    src="https://kit.fontawesome.com/YOUR-KIT-CODE.js"
    crossorigin="anonymous"
    ></script> -->

    <!-- i element to create the icons -->

    <!--  copy and paste from the site -->
    <!-- https://fontawesome.com/icons/reddit?f=brands&s=solid -->
    <i class="fa-brands fa-reddit"></i>

    <i class="fas fa-heart"></i>
    <i class="fas fa-star"></i>

    <i class="fas fa-camera"></i>

    <!-- we can lookup the icons and types on the fontawesome website - https://fontawesome.com/icons -->

    <!-- what do the different class types mean -->

    <!-- fas - alias for "fa-solid" - bold -->
    <div>
      <i class="fas fa-camera"></i>
    </div>

    <!-- far - alias for "fa-regular" -->
    <div>
      <i class="far fa-camera"></i>
    </div>

    <!-- fab - social media type -->
    <div>
      <!-- GitHub -->
      <i class="fab fa-github"></i>
      <!-- Twitter -->
      <i class="fab fa-twitter"></i>
      <!-- LinkedIn -->
      <i class="fab fa-linkedin"></i>
    </div>

    <!-- icon sizing -->

    <div>
      <i class="far fa-xs fa-camera"></i>
      <i class="far fa-sm fa-camera"></i>
      <i class="far fa-camera"></i>
      <i class="far fa-lg fa-camera"></i>
      <i class="far fa-2x fa-camera"></i>
      <i class="far fa-3x fa-camera"></i>
      <i class="far fa-5x fa-camera"></i>
      <i class="far fa-10x fa-camera"></i>
    </div>

    <!-- custom sizing -->
    <i class="far fa-star custom-sizing"></i>

    <!-- add some color -->
    <div>
      <div>
        <!-- GitHub -->
        <i class="fab fa-github"></i>
        <!-- Twitter -->
        <i class="fab fa-twitter"></i>
        <!-- LinkedIn -->
        <i class="fab fa-linkedin"></i>
      </div>
    </div>

      <!-- spacing -->
    <div>
      <i class="fab fa-linkedin spacing"></i>
    </div>

    <!-- animations -->

    <!-- default -->
    <i class="far fa-star"></i>

    <!-- spin -->
    <i class="far fa-star fa-spin"></i>

    <!-- beat -->
    <i class="fas fa-heart fa-beat"></i>

    <!-- shaking -->
    <i class="fas fa-bell fa-shake"></i>

    <!-- bounce -->
    <i class="fas fa-bounce fa-circle"></i>

    <div class="container">
      <span>Basketball</span> <i class="fas fa-bounce fa-circle"></i>
    </div>
  </body>
</html>
