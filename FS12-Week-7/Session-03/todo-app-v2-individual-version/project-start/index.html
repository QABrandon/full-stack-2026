<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <h1>My Todo List</h1>
    </header>

    <main>
      <section class="todo-input-section">
        <form id="todo-form" class="todo-form">
          <div class="input-group">
            <input
              type="text"
              id="todo-input"
              placeholder="Enter a new todo..."
              required
              aria-label="New todo item"
            />
            <button type="submit" class="add-btn">Add Todo</button>
          </div>
          <div id="error-message" class="error-message" role="alert"></div>
        </form>
      </section>

      <section class="todo-list-section">
        <div class="todo-controls">
          <span id="todo-count" aria-live="polite">0 items remaining</span>
        </div>

        <ul id="todo-list" class="todo-list">
          <!-- Dynamic todo items will be inserted here -->
        </ul>
      </section>
    </main>
  </body>
</html>
