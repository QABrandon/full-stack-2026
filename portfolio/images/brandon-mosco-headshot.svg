<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-labelledby="title desc">
  <title id="title">Portrait placeholder for Brandon Mosco</title>
  <desc id="desc">Stylized placeholder image with initials BM on a gradient background</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="8"/>
  <text x="200" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="96" font-weight="700" fill="#f8fafc">BM</text>
</svg>
