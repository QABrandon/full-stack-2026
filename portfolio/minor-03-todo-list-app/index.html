<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Minor 03 todo list app by Brandon Mosco, built with vanilla HTML, CSS, JavaScript, DOM events, validation, and local storage."
    >
    <title>Minor 03: Todo List App | Brandon Mosco</title>
    <link rel="icon" href="../src/images/BM%20Icon-bg.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>

    <header class="site-header">
      <a class="home-link" href="/" aria-label="Return to portfolio home">BM Web Studio</a>
      <h1>Individual Todo List</h1>
      <p>Practice with DOM events, form validation, dynamic rendering, and local storage.</p>
    </header>

    <main id="main">
      <section class="todo-input-section" aria-labelledby="todo-form-heading">
        <h2 id="todo-form-heading" class="sr-only">Add a new todo</h2>
        <form id="todo-form" class="todo-form">
          <div class="input-group">
            <input
              type="text"
              id="todo-input"
              placeholder="Enter a new todo..."
              required
              aria-label="New todo item"
            >
            <button type="submit" class="add-btn">Add Todo</button>
          </div>
          <div id="error-message" class="error-message" role="alert"></div>
        </form>
      </section>

      <section class="todo-list-section" aria-labelledby="todo-list-heading">
        <h2 id="todo-list-heading" class="sr-only">Todo list</h2>
        <ul id="todo-list" class="todo-list">
          <!-- Dynamic todo items will be inserted here -->
        </ul>
      </section>
    </main>
  </body>
</html>
